aid: donnees-montreal-ca
name: Donnees Ouvertes Montreal
description: >-
  Donnees Ouvertes Montreal is a municipal government open-data portal for Canada running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 401 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
