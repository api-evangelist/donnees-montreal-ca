apis:
  - aid: donnees-montreal-ca:catalog
    name: Donnees Ouvertes Montreal CKAN Action API
    description: >-
      CKAN Action API for Donnees Ouvertes Montreal, a consistent JSON-over-HTTP interface over a catalog of 401 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://donnees.montreal.ca/api/3/action/.
